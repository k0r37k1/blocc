name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Deploy via LFTP
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
            mirror --reverse --verbose --only-newer \
              --exclude-glob .git/ \
              --exclude-glob .git* \
              --exclude-glob .env \
              --exclude-glob .env.* \
              --exclude-glob vendor/ \
              --exclude-glob node_modules/ \
              --exclude-glob storage/ \
              --exclude-glob database/*.sqlite \
              --exclude-glob database/*.sqlite-wal \
              --exclude-glob database/*.sqlite-shm \
              --exclude-glob tests/ \
              --exclude-glob test-results/ \
              --exclude-glob playwright-report/ \
              --exclude-glob playwright.config.ts \
              --exclude-glob Upload/ \
              --exclude-glob .phpunit.cache/ \
              --exclude-glob .planning/ \
              --exclude-glob .junie/ \
              --exclude-glob .DS_Store \
              --exclude-glob public/storage \
              --exclude-glob public/hot \
              ./ ${{ secrets.FTP_SERVER_DIR }};
          "
